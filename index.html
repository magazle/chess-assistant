<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Assistant</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="setup">
      <h1>Chess Assistant</h1>
      <p>Il motore scacchistico gioca i tuoi pezzi.<br>Tu muovi quelli dell'avversario.</p>
      <small>Minimax + alpha-beta pruning — nessuna AI, calcolo reale</small>
      <div class="color-choice">
        <div class="cbtn" onclick="startGame('w')">
          <span class="pi wpi">♔</span>
          <span class="btnlbl">Gioca Bianco</span>
        </div>
        <div class="cbtn" onclick="startGame('b')">
          <span class="pi bpi">♚</span>
          <span class="btnlbl">Gioca Nero</span>
        </div>
      </div>
    </div>
    <div id="game"></div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script src="engine.js"></script>
  <script src="ui.js"></script>
</body>
</html>
